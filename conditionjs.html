<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statement in JavaScript</title>
</head>

<body>
    <script>
        // Conditional statements in JavaScript allow code to make decisions and execute different blocks of code based on whether a condition evaluates to true or false. The main types of conditional statements include if, else if, else, switch, and the ternary operator
        // if Statement: Executes code if a condition is true.
        let age = 20;
        if (age >= 18) {
            console.log("You are eligible to vote."); // Output: You are eligible to vote.
        }
        // if...else Statement: Executes one block if the condition is true, and another if false
        age = 16;
        if (age >= 18) {
            console.log("You are an adult.");
        } else {
            console.log("You are underage."); // Output: You are underage.
        }
        // if...else if...else (Else-If Ladder): Tests multiple conditions sequentially.
        let marks = 72;
        if (marks >= 90) {
            console.log("Grade: A+");
        } else if (marks >= 75) {
            console.log("Grade: A");
        } else if (marks >= 60) {
            console.log("Grade: B"); // Output: Grade: B
        } else {
            console.log("Grade: C");
        }
        // switch Statement: Compares an expression against multiple case labels, ideal for checking many fixed values
        let day = "Tuesday";
        switch (day) {
            case "Monday":
                console.log("Start of the week!");
                break;
            case "Tuesday":
                console.log("Keep going, it's only Tuesday!"); // Output: Keep going, it's only Tuesday!
                break;
            case "Friday":
                console.log("Finally, Friday!");
                break;
            default:
                console.log("Just another day...");
        }
        // Ternary Operator (?:): A compact, one-line if...else alternative for assignments


    </script>
</body>

</html>
